services:
  - type: web
    name: rosetta-datahub
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements-demo.txt gunicorn"
    startCommand: "gunicorn --chdir webapp app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
