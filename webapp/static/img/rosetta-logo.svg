<svg width="420" height="120" viewBox="0 0 420 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rosetta logo">
  <defs>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="0.5" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- stone tablet -->
  <rect x="10" y="14" width="92" height="92" rx="18" fill="url(#stone)"/>
  <rect x="41" y="14" width="1.6" height="92" fill="#0a0f1f" opacity="0.35"/>
  <rect x="70" y="14" width="1.6" height="92" fill="#0a0f1f" opacity="0.35"/>
  <!-- script bands (abstract glyphs) -->
  <g stroke="#bfe9f2" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <path d="M20 32h12M20 44h9M20 56h13M20 68h8M20 80h12"/>
    <path d="M49 30h14M49 42h11M49 54h15M49 66h10M49 78h14"/>
    <path d="M78 32h14M78 44h11M78 56h13M78 68h9M78 80h13"/>
  </g>
  <!-- knowledge-graph node cluster -->
  <g filter="url(#glow)">
    <line x1="38" y1="72" x2="66" y2="44" stroke="#22d3ee" stroke-width="2.4"/>
    <line x1="66" y1="44" x2="70" y2="80" stroke="#22d3ee" stroke-width="2.4"/>
    <line x1="38" y1="72" x2="70" y2="80" stroke="#22d3ee" stroke-width="2.4"/>
    <circle cx="38" cy="72" r="6.5" fill="#22d3ee"/>
    <circle cx="66" cy="44" r="6.5" fill="#22d3ee"/>
    <circle cx="70" cy="80" r="6.5" fill="#22d3ee"/>
  </g>
  <!-- wordmark -->
  <text x="122" y="62" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">Rosetta</text>
  <text x="124" y="90" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" letter-spacing="1.5" fill="#22d3ee">SEMANTIC CONSISTENCY AGENT</text>
</svg>
